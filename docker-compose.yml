# All services share one internal network so they can reach each other by container name.
# External ports are exposed only where you need to connect from your host machine.
networks:
  lakehouse:
    driver: bridge

volumes:
  postgres_data:
  spark_ivy:     # caches Maven JARs so packages aren't re-downloaded on every restart

services:

  # ─── SOURCE DATABASE ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: cdc_postgres
    networks: [lakehouse]
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # These three flags unlock logical replication:
    #   wal_level=logical    → WAL includes full before/after row images (not just diffs)
    #   max_replication_slots → how many CDC consumers can hold a WAL cursor simultaneously
    #   max_wal_senders       → how many processes can stream WAL to consumers
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=4
      - -c
      - max_wal_senders=4
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── EVENT BROKER ─────────────────────────────────────────────────────────────
  # Redpanda is Kafka-API-compatible but runs as a single process (no Zookeeper).
  # Internal address (redpanda:9092) is used by containers; external (localhost:19092) by your host.
  redpanda:
    image: redpandadata/redpanda:v24.1.1
    container_name: cdc_redpanda
    networks: [lakehouse]
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 1G
      - --mode dev-container
      - --default-log-level=warn
    ports:
      - "18081:18081"  # Schema Registry
      - "18082:18082"  # HTTP Proxy
      - "19092:19092"  # Kafka API (host access)
      - "9644:9644"    # Admin API

  # ─── BROKER UI ────────────────────────────────────────────────────────────────
  redpanda-console:
    image: redpandadata/console:v2.5.2
    container_name: cdc_console
    networks: [lakehouse]
    depends_on: [redpanda]
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"

  # ─── CDC ENGINE ───────────────────────────────────────────────────────────────
  # Debezium runs inside Kafka Connect. It opens a replication slot in Postgres
  # and streams every row-level change (INSERT/UPDATE/DELETE) into Kafka topics,
  # with a "before" and "after" snapshot for each event.
  kafka-connect:
    image: quay.io/debezium/connect:2.7
    container_name: cdc_connect
    networks: [lakehouse]
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: debezium-connect
      CONFIG_STORAGE_TOPIC: debezium.configs
      OFFSET_STORAGE_TOPIC: debezium.offsets
      STATUS_STORAGE_TOPIC: debezium.statuses
      # Plain JSON — easier to inspect while learning; swap for Avro + Schema Registry later
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── PROCESSING & STORAGE (Phase 3) ──────────────────────────────────────────
  # Spark and Trino are defined here but not started until their phases.
  # Start them with: docker compose --profile analytics up -d
  spark:
    image: bitnami/spark:3.5
    container_name: cdc_spark
    networks: [lakehouse]
    profiles: [analytics]
    environment:
      SPARK_MODE: master
      SPARK_MASTER_WEBUI_PORT: "8888"
    volumes:
      - ./src/transformers:/opt/bitnami/spark/work    # job scripts
      - ./warehouse:/warehouse                         # Iceberg data files
      - spark_ivy:/root/.ivy2                          # JAR download cache
    ports:
      - "8888:8888"  # Spark master web UI
      - "4040:4040"  # Spark application UI (active while a job runs)

  trino:
    image: trinodb/trino:435
    container_name: cdc_trino
    networks: [lakehouse]
    profiles: [analytics]
    volumes:
      - ./config/trino:/etc/trino/catalog
      - ./warehouse:/var/trino/warehouse
    ports:
      - "8090:8080"
